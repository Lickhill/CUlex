spring.application.name=culex

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=culex_db

# JWT Configuration
# Provide the secret from environment variable JWT_SECRET in production.
# The fallback is for local development only. Must be at least 64 chars for HS512.
jwt.secret=${JWT_SECRET:change_me_to_a_super_long_secure_secret_key_that_is_at_least_64_characters_long}
jwt.expiration=86400000

# Server Configuration
server.port=8080

# CORS is configured in SecurityConfig. Remove duplicate/unknown properties below.
# (If you need to customize, do it in SecurityConfig.java)

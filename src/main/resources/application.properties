spring.application.name=culex

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=culex_db

# JWT Configuration
# This secret is used for DEVELOPMENT ONLY. In production, set JWT_SECRET environment variable.
# Must be at least 64 characters for HS512 algorithm.
jwt.secret=mySecretKeyForJWTTokenSigningMustBeAtLeast64CharactersLongForHS512Algorithm1234567890
jwt.expiration=86400000

# Server Configuration
server.port=8080

# CORS is configured in SecurityConfig. Remove duplicate/unknown properties below.
# (If you need to customize, do it in SecurityConfig.java)
